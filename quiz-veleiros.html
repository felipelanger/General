<style>
  :root {
    --bg: #0B2036;
    --panel: #123049;
    --panel-2: #17395A;
    --text: #EAF3F8;
    --text-dim: #7FA5BE;
    --accent: #FFB020;
    --accent-dim: #D8931A;
    --correct: #35C77E;
    --correct-dim: #269963;
    --wrong: #FF6B5B;
    --wrong-dim: #D8503F;
    --dash: #274B69;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    margin: 0;
    overflow: hidden;
    background: var(--bg);
    background-image:
      radial-gradient(ellipse at top, rgba(255,255,255,0.05), transparent 55%),
      radial-gradient(ellipse at bottom, rgba(0,0,0,0.15), transparent 60%);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
  }

  #app {
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    max-width: 480px;
    margin: 0 auto;
    padding: 20px 18px calc(16px + env(safe-area-inset-bottom));
  }

  .screen {
    flex: 1 1 auto;
    display: none;
    flex-direction: column;
    min-height: 0;
  }
  .screen.active { display: flex; }

  h1, h2 {
    font-family: 'Fredoka', sans-serif;
    margin: 0;
  }

  /* ---------- START SCREEN ---------- */
  #screen-start {
    justify-content: center;
    align-items: center;
    text-align: center;
    gap: 18px;
  }
  .boat-emoji { font-size: 56px; line-height: 1; }
  #screen-start h1 {
    font-size: 30px;
    color: var(--accent);
  }
  #screen-start p {
    color: var(--text-dim);
    font-size: 14.5px;
    max-width: 320px;
    line-height: 1.5;
    margin: 0;
  }
  #high-score {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    color: var(--text-dim);
    background: var(--panel);
    border: 1.5px solid var(--dash);
    border-radius: 10px;
    padding: 8px 14px;
  }
  #high-score b { color: var(--accent); }

  .btn-primary {
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 18px;
    background: var(--accent);
    color: #241705;
    border: none;
    border-radius: 14px;
    padding: 15px 34px;
    cursor: pointer;
    box-shadow: 0 6px 0 var(--accent-dim);
    transition: transform 0.08s ease, box-shadow 0.08s ease;
  }
  .btn-primary:active {
    transform: translateY(4px);
    box-shadow: 0 2px 0 var(--accent-dim);
  }

  /* ---------- QUIZ SCREEN ---------- */
  #screen-quiz { gap: 14px; }

  .quiz-header {
    flex: 0 0 auto;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .quiz-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12.5px;
    color: var(--text-dim);
  }
  #progress-track {
    height: 8px;
    background: var(--panel);
    border-radius: 6px;
    overflow: hidden;
  }
  #progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 6px;
    transition: width 0.25s ease;
  }

  #question-box {
    flex: 0 0 auto;
    background: var(--panel);
    border-radius: 16px;
    padding: 22px 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    min-height: 110px;
  }
  #question-text {
    font-family: 'Fredoka', sans-serif;
    font-weight: 500;
    font-size: 19px;
    line-height: 1.35;
  }

  #options {
    flex: 1 1 auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-height: 0;
  }

  .option-btn {
    flex: 1 1 0;
    min-height: 0;
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--panel);
    border: 1.5px solid var(--dash);
    border-radius: 12px;
    padding: 0 16px;
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px;
    text-align: left;
    cursor: pointer;
  }
  .option-btn .opt-letter {
    flex: 0 0 auto;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: var(--panel-2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
  }
  .option-btn .opt-text { flex: 1 1 auto; }

  .option-btn.correct {
    background: rgba(53, 199, 126, 0.16);
    border-color: var(--correct);
  }
  .option-btn.correct .opt-letter { background: var(--correct); color: #062815; }

  .option-btn.wrong {
    background: rgba(255, 107, 91, 0.16);
    border-color: var(--wrong);
  }
  .option-btn.wrong .opt-letter { background: var(--wrong); color: #340a05; }

  .option-btn.disabled { pointer-events: none; opacity: 0.55; }
  .option-btn.correct.disabled, .option-btn.wrong.disabled { opacity: 1; }

  #next-wrap {
    flex: 0 0 auto;
    display: flex;
    justify-content: center;
    padding-top: 4px;
    min-height: 52px;
  }
  #btn-next {
    display: none;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 15px;
    background: var(--accent);
    color: #241705;
    border: none;
    border-radius: 12px;
    padding: 12px 30px;
    cursor: pointer;
  }
  #btn-next.show { display: block; }

  /* ---------- RESULT SCREEN ---------- */
  #screen-result {
    gap: 14px;
    overflow: hidden;
  }
  #result-summary {
    flex: 0 0 auto;
    text-align: center;
    background: var(--panel);
    border-radius: 16px;
    padding: 18px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  #result-score {
    font-family: 'Fredoka', sans-serif;
    font-weight: 700;
    font-size: 42px;
    color: var(--accent);
  }
  #result-message {
    font-size: 14px;
    color: var(--text-dim);
  }

  #result-review {
    flex: 1 1 auto;
    min-height: 0;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding-right: 2px;
  }
  .review-empty {
    text-align: center;
    color: var(--text-dim);
    font-size: 14px;
    padding: 20px 10px;
  }
  .review-card {
    background: var(--panel);
    border: 1.5px solid var(--dash);
    border-radius: 12px;
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .review-question {
    font-family: 'Fredoka', sans-serif;
    font-size: 14.5px;
    line-height: 1.3;
  }
  .review-line {
    font-size: 12.5px;
    display: flex;
    gap: 6px;
    align-items: baseline;
  }
  .review-line .tag {
    flex: 0 0 auto;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 5px;
  }
  .review-line.your .tag { background: rgba(255, 107, 91, 0.2); color: var(--wrong); }
  .review-line.correct .tag { background: rgba(53, 199, 126, 0.2); color: var(--correct); }

  #result-actions {
    flex: 0 0 auto;
    display: flex;
    gap: 10px;
    padding-top: 4px;
  }
  .btn-secondary {
    flex: 1;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 14.5px;
    background: transparent;
    color: var(--text-dim);
    border: 1.5px solid var(--dash);
    border-radius: 12px;
    padding: 12px;
    cursor: pointer;
  }
  .btn-play-again {
    flex: 2;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 15px;
    background: var(--accent);
    color: #241705;
    border: none;
    border-radius: 12px;
    padding: 12px;
    cursor: pointer;
  }
</style>
</head>
<body>
<div id="app">

  <!-- TELA INICIAL -->
  <div class="screen active" id="screen-start">
    <div class="boat-emoji">⛵</div>
    <h1>Quiz de Navegação a Vela</h1>
    <p>10 perguntas aleatórias sobre termos, manobras e regras de navegação a vela. Quantas você acerta?</p>
    <div id="high-score">Recorde: <b id="high-score-value">—</b></div>
    <button class="btn-primary" id="btn-start">▶ Começar</button>
  </div>

  <!-- TELA DO QUIZ -->
  <div class="screen" id="screen-quiz">
    <div class="quiz-header">
      <div class="quiz-meta">
        <span id="question-counter">Pergunta 1/10</span>
        <span id="score-live">Acertos: 0</span>
      </div>
      <div id="progress-track"><div id="progress-fill" style="width:0%"></div></div>
    </div>

    <div id="question-box">
      <div id="question-text"></div>
    </div>

    <div id="options"></div>

    <div id="next-wrap">
      <button id="btn-next">Próxima →</button>
    </div>
  </div>

  <!-- TELA DE RESULTADO -->
  <div class="screen" id="screen-result">
    <div id="result-summary">
      <div id="result-score">0/10</div>
      <div id="result-message"></div>
    </div>
    <div id="result-review"></div>
    <div id="result-actions">
      <button class="btn-secondary" id="btn-home">Início</button>
      <button class="btn-play-again" id="btn-play-again">🔁 Jogar de novo</button>
    </div>
  </div>

</div>

de:", "options": ["Estai", "Brandal", "Amantilho", "Escota"], "answerIndex": 1}, {"id": 37, "question": "O cabo fixo que sustenta o mastro na direção proa-popa é chamado de:", "options": ["Brandal", "Estai", "Adriça", "Verga"], "answerIndex": 1}, {"id": 38, "question": "O cabo usado para sustentar/ajustar a altura da retranca é chamado de:", "options": ["Amantilho", "Escota", "Adriça", "Estai"], "answerIndex": 0}, {"id": 39, "question": "A escala usada para medir a intensidade do vento é a escala:", "options": ["Richter", "Saffir-Simpson", "Beaufort", "Fahrenheit"], "answerIndex": 2}, {"id": 40, "question": "Segundo as regras internacionais, entre dois veleiros cruzando rumos, geralmente tem preferência o que está:", "options": ["A barlavento", "Com o vento a bombordo", "Com o vento a estibordo", "Mais rápido"], "answerIndex": 2}, {"id": 41, "question": "O sistema de balizamento que usa boias coloridas para indicar canais de navegação é chamado de:", "options": ["Sistema IALA", "Sistema GPS", "Sistema Beaufort", "Sistema AIS"], "answerIndex": 0}, {"id": 42, "question": "O equipamento eletrônico que transmite a posição do navio para outros barcos e para terra é o:", "options": ["GPS", "AIS", "Radar", "Sonar"], "answerIndex": 1}, {"id": 43, "question": "O instrumento usado para determinar a direção usando o norte magnético é a:", "options": ["Corredeira", "Bússola", "Sonda", "Bitácula"], "answerIndex": 1}, {"id": 44, "question": "A diferença entre o norte verdadeiro (geográfico) e o norte magnético é chamada de:", "options": ["Declinação magnética", "Deriva", "Abatimento", "Compensação"], "answerIndex": 0}, {"id": 45, "question": "O efeito do vento/corrente que desvia o barco lateralmente da rota pretendida é chamado de:", "options": ["Abatimento / Deriva", "Guinada", "Caturro", "Arfagem"], "answerIndex": 0}, {"id": 46, "question": "O movimento de vaivém para cima e para baixo da proa causado pelas ondas é chamado de:", "options": ["Caturro", "Balanço", "Guinada", "Deriva"], "answerIndex": 0}, {"id": 47, "question": "O movimento de inclinação lateral (de um bordo a outro) causado pelas ondas é chamado de:", "options": ["Caturro", "Balanço", "Arfagem", "Guinada"], "answerIndex": 1}, {"id": 48, "question": "Qual desses é um item obrigatório de segurança a bordo?", "options": ["Colete salva-vidas", "Âncora extra", "Rádio AM/FM", "Bandeira decorativa"], "answerIndex": 0}, {"id": 49, "question": "O termo usado para quando o vento passa de um bordo para o outro de forma descontrolada, podendo causar acidentes, é:", "options": ["Guinada controlada", "Empanada acidental (jibe involuntário)", "Arribada", "Bolina"], "answerIndex": 1}, {"id": 50, "question": "A profundidade da parte submersa do casco, da linha d'água até a quilha, é chamada de:", "options": ["Calado", "Boca", "Comprimento total", "Deslocamento"], "answerIndex": 0}];

  const QUIZ_SIZE = 10;
  const HIGH_SCORE_KEY = "quiz-veleiros:highscore";

  const screens = {
    start: document.getElementById("screen-start"),
    quiz: document.getElementById("screen-quiz"),
    result: document.getElementById("screen-result"),
  };

  function showScreen(name) {
    Object.values(screens).forEach((s) => s.classList.remove("active"));
    screens[name].classList.add("active");
  }

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function getHighScore() {
    try {
      return parseInt(localStorage.getItem(HIGH_SCORE_KEY) || "0", 10);
    } catch (e) {
      return 0;
    }
  }

  function setHighScore(score) {
    try {
      const current = getHighScore();
      if (score > current) localStorage.setItem(HIGH_SCORE_KEY, String(score));
    } catch (e) { /* ignore */ }
  }

  function renderHighScore() {
    const hs = getHighScore();
    document.getElementById("high-score-value").textContent = hs > 0 ? `${hs}/${QUIZ_SIZE}` : "—";
  }

  // ---------------- Estado do jogo ----------------
  let quizQuestions = [];
  let currentIndex = 0;
  let score = 0;
  let wrongAnswers = []; // { question, options, correctIndex, selectedIndex }
  let answered = false;

  const LETTERS = ["A", "B", "C", "D"];

  function startQuiz() {
    quizQuestions = shuffle(QUESTION_BANK).slice(0, QUIZ_SIZE);
    currentIndex = 0;
    score = 0;
    wrongAnswers = [];
    showScreen("quiz");
    renderQuestion();
  }

  function renderQuestion() {
    answered = false;
    const q = quizQuestions[currentIndex];

    document.getElementById("question-counter").textContent = `Pergunta ${currentIndex + 1}/${QUIZ_SIZE}`;
    document.getElementById("score-live").textContent = `Acertos: ${score}`;
    document.getElementById("progress-fill").style.width = `${(currentIndex / QUIZ_SIZE) * 100}%`;
    document.getElementById("question-text").textContent = q.question;

    const optionsEl = document.getElementById("options");
    optionsEl.innerHTML = "";

    q.options.forEach((optText, idx) => {
      const btn = document.createElement("button");
      btn.className = "option-btn";
      btn.innerHTML = `<span class="opt-letter">${LETTERS[idx]}</span><span class="opt-text"></span>`;
      btn.querySelector(".opt-text").textContent = optText;
      btn.addEventListener("click", () => selectAnswer(idx));
      optionsEl.appendChild(btn);
    });

    document.getElementById("btn-next").classList.remove("show");
  }

  function selectAnswer(selectedIdx) {
    if (answered) return;
    answered = true;

    const q = quizQuestions[currentIndex];
    const buttons = document.querySelectorAll("#options .option-btn");

    buttons.forEach((btn, idx) => {
      btn.classList.add("disabled");
      if (idx === q.answerIndex) btn.classList.add("correct");
      else if (idx === selectedIdx) btn.classList.add("wrong");
    });

    if (selectedIdx === q.answerIndex) {
      score++;
    } else {
      wrongAnswers.push({
        question: q.question,
        options: q.options,
        correctIndex: q.answerIndex,
        selectedIndex: selectedIdx,
      });
    }

    document.getElementById("score-live").textContent = `Acertos: ${score}`;
    document.getElementById("btn-next").classList.add("show");
  }

  function nextQuestion() {
    currentIndex++;
    if (currentIndex >= QUIZ_SIZE) {
      finishQuiz();
    } else {
      renderQuestion();
    }
  }

  function finishQuiz() {
    document.getElementById("progress-fill").style.width = "100%";
    setHighScore(score);
    renderHighScore();

    document.getElementById("result-score").textContent = `${score}/${QUIZ_SIZE}`;

    let message;
    if (score === QUIZ_SIZE) message = "Timoneiro raiz! Nota máxima. ⚓";
    else if (score >= 8) message = "Muito bom, marinheiro(a)! Quase lá.";
    else if (score >= 5) message = "Bom começo — vale rever algumas cartas.";
    else message = "Bora estudar mais um pouco antes de zarpar. 🗺️";
    document.getElementById("result-message").textContent = message;

    const reviewEl = document.getElementById("result-review");
    reviewEl.innerHTML = "";

    if (wrongAnswers.length === 0) {
      const empty = document.createElement("div");
      empty.className = "review-empty";
      empty.textContent = "Você não errou nenhuma pergunta! 🎉";
      reviewEl.appendChild(empty);
    } else {
      wrongAnswers.forEach((w) => {
        const card = document.createElement("div");
        card.className = "review-card";
        card.innerHTML = `
          <div class="review-question"></div>
          <div class="review-line your"><span class="tag">SUA RESPOSTA</span><span class="your-text"></span></div>
          <div class="review-line correct"><span class="tag">CORRETA</span><span class="correct-text"></span></div>
        `;
        card.querySelector(".review-question").textContent = w.question;
        card.querySelector(".your-text").textContent = w.options[w.selectedIndex];
        card.querySelector(".correct-text").textContent = w.options[w.correctIndex];
        reviewEl.appendChild(card);
      });
    }

    showScreen("result");
  }

  document.getElementById("btn-start").addEventListener("click", startQuiz);
  document.getElementById("btn-next").addEventListener("click", nextQuestion);
  document.getElementById("btn-play-again").addEventListener("click", startQuiz);
  document.getElementById("btn-home").addEventListener("click", () => showScreen("start"));

  renderHighScore();
</script>
</body>
